# Docker Compose for Production
# Sistem Manajemen Parkir & Akses Kendaraan Perumahan

version: '3.8'

services:
  # Main Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siparkir-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/production.db
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    networks:
      - siparkir-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: siparkir-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - siparkir-network

  # Backup Service (Optional)
  backup:
    image: alpine:latest
    container_name: siparkir-backup
    restart: unless-stopped
    volumes:
      - ./db:/data
      - ./backups:/backups
    command: sh -c "while true; do tar -czf /backups/backup-$$(date +%Y%m%d-%H%M%S).tar.gz -C /data .; sleep 86400; done"
    networks:
      - siparkir-network

networks:
  siparkir-network:
    driver: bridge

volumes:
  db-data:
  backup-data:
